<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lever-Runner Dashboard</title>
  <style>
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --fg: #e4e4e7;
            --muted: #888; --accent: #22c55e; --danger: #ef4444; --warn: #f59e0b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: var(--bg); color: var(--fg); min-height: 100vh; }
    .app { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

    header { display: flex; align-items: center; justify-content: space-between;
             margin-bottom: 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block;
                  margin-right: 6px; }
    .status-dot.ok { background: var(--accent); }
    .status-dot.err { background: var(--danger); }

    /* Command input */
    .cmd-bar { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .cmd-bar input { flex: 1; padding: .65rem .85rem; border-radius: 6px;
                     border: 1px solid var(--border); background: var(--surface);
                     color: var(--fg); font-size: .95rem; outline: none; }
    .cmd-bar input:focus { border-color: var(--accent); }
    .cmd-bar button { padding: .65rem 1.2rem; border-radius: 6px; border: none;
                      background: var(--accent); color: #000; font-weight: 600;
                      cursor: pointer; font-size: .95rem; }
    .cmd-bar button:disabled { opacity: .5; cursor: not-allowed; }

    /* Teach bar */
    .teach-bar { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .teach-bar input { flex: 1; min-width: 140px; padding: .55rem .75rem;
                       border-radius: 6px; border: 1px solid var(--border);
                       background: var(--surface); color: var(--fg); font-size: .9rem; }
    .teach-bar button { padding: .55rem 1rem; border-radius: 6px; border: none;
                        background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer; }

    /* Result */
    .result { background: var(--surface); border: 1px solid var(--border);
              border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; display: none; }
    .result.show { display: block; }
    .result-header { display: flex; justify-content: space-between; margin-bottom: .5rem; }
    .result-header .intent { color: var(--muted); font-size: .85rem; }
    .result-header .cmd { font-family: monospace; color: var(--accent); }
    .result pre { background: #000; padding: .75rem; border-radius: 4px;
                  overflow-x: auto; font-size: .85rem; line-height: 1.5;
                  max-height: 300px; overflow-y: auto; }
    .result .meta { display: flex; gap: 1rem; margin-top: .5rem; font-size: .8rem;
                    color: var(--muted); }

    /* Commands table */
    .cmd-list { margin-top: 1rem; }
    .cmd-list h2 { font-size: 1.1rem; margin-bottom: .75rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    .trust-badge { padding: 2px 8px; border-radius: 10px; font-weight: 600;
                   font-size: .8rem; }
    .trust-high { background: #16a34a22; color: var(--accent); }
    .trust-mid { background: #f59e0b22; color: var(--warn); }
    .trust-low { background: #ef444422; color: var(--danger); }

    .loading { color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>⚡ Lever-Runner</h1>
    <span id="health"><span class="status-dot err"></span>disconnected</span>
  </header>

  <div class="cmd-bar">
    <input id="request" placeholder="e.g. check disk usage" autofocus
           onkeydown="if(event.key==='Enter')runCmd()">
    <button id="runBtn" onclick="runCmd()">Run</button>
  </div>

  <div class="teach-bar">
    <input id="teachPhrase" placeholder="intent phrase">
    <input id="teachCmd" placeholder="shell command">
    <button onclick="teachCmd()">Teach</button>
  </div>

  <div id="result" class="result">
    <div class="result-header">
      <span class="intent" id="resIntent"></span>
      <span class="cmd" id="resCmd"></span>
    </div>
    <pre id="resOutput"></pre>
    <div class="meta">
      <span id="resExit"></span>
      <span id="resTokens"></span>
      <span id="resTime"></span>
    </div>
  </div>

  <div class="cmd-list">
    <h2>Commands</h2>
    <div id="cmdTable"><span class="loading">Loading…</span></div>
  </div>
</div>

<script>
const API = location.port === '' ? 'http://localhost:8765' : '';
let _start = 0;

async function api(path, opts = {}) {
  const r = await fetch(API + path, opts);
  return r.json();
}

function trustBadge(score) {
  const cls = score >= 70 ? 'trust-high' : score >= 40 ? 'trust-mid' : 'trust-low';
  return `<span class="trust-badge ${cls}">${score}</span>`;
}

async function checkHealth() {
  try {
    const d = await api('/healthz');
    document.getElementById('health').innerHTML =
      `<span class="status-dot ok"></span>v${d.version} · ${d.total_commands} cmds · ${Math.round(d.uptime_sec)}s up`;
  } catch {
    document.getElementById('health').innerHTML = `<span class="status-dot err"></span>disconnected`;
  }
}

async function runCmd() {
  const req = document.getElementById('request').value.trim();
  if (!req) return;
  document.getElementById('runBtn').disabled = true;
  _start = performance.now();
  try {
    const d = await api('/run', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({request: req}),
    });
    showResult(d);
  } catch (e) {
    showResult({ok: false, stderr: String(e), exit_code: -1});
  }
  document.getElementById('runBtn').disabled = false;
}

async function teachCmd() {
  const phrase = document.getElementById('teachPhrase').value.trim();
  const cmd = document.getElementById('teachCmd').value.trim();
  if (!phrase || !cmd) return;
  try {
    const d = await api('/teach', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({intent_phrase: phrase, command: cmd}),
    });
    document.getElementById('teachPhrase').value = '';
    document.getElementById('teachCmd').value = '';
    loadCommands();
  } catch (e) {
    alert('Teach failed: ' + e);
  }
}

function showResult(d) {
  const el = document.getElementById('result');
  el.classList.add('show');
  document.getElementById('resIntent').textContent = d.intent || '';
  document.getElementById('resCmd').textContent = d.command || '';
  const output = d.stdout || '';
  const err = d.stderr ? '\n--- stderr ---\n' + d.stderr : '';
  document.getElementById('resOutput').textContent = output + err;
  document.getElementById('resExit').textContent = `exit: ${d.exit_code ?? '?'}`;
  document.getElementById('resTokens').textContent =
    `tokens: ${d.tokens_in ?? '?'}→${d.tokens_out ?? '?'}`;
  const elapsed = _start ? ((performance.now() - _start) / 1000).toFixed(2) : '?';
  document.getElementById('resTime').textContent = `${elapsed}s`;
}

async function loadCommands() {
  try {
    const d = await api('/commands');
    const cmds = d.commands || [];
    if (!cmds.length) {
      document.getElementById('cmdTable').innerHTML = '<span class="loading">No commands yet.</span>';
      return;
    }
    let html = '<table><tr><th>Intent</th><th>Command</th><th>Trust</th><th>✓ / ✗</th></tr>';
    cmds.sort((a, b) => (b.trust_score || 0) - (a.trust_score || 0));
    for (const c of cmds) {
      html += `<tr>
        <td>${c.intent_phrase || ''}</td>
        <td><code>${c.command || ''}</code></td>
        <td>${trustBadge(c.trust_score ?? 0)}</td>
        <td>${c.success_count ?? 0} / ${c.failure_count ?? 0}</td>
      </tr>`;
    }
    html += '</table>';
    document.getElementById('cmdTable').innerHTML = html;
  } catch {
    document.getElementById('cmdTable').innerHTML = '<span class="loading">Failed to load commands.</span>';
  }
}

checkHealth();
loadCommands();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
